name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Data
        env:
          MY_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 日時を取得（日本時間にする場合は TZ=Asia/Tokyo date ...）
          DEPLOY_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          echo "Deploy Time: ${DEPLOY_TIME}"
          
          # APIキーと時間を書き換え
          sed -i "s|__API_KEY_PLACEHOLDER__|${MY_API_KEY}|g" index.html
          sed -i "s|__BUILD_TIME_PLACEHOLDER__|${DEPLOY_TIME}|g" index.html
          
          echo "Injection successful."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
