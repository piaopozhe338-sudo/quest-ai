name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config File
        run: |
          # config.js を新規作成し、そこにAPIキーを書き込みます
          # これにより、index.html の書き換え失敗という問題がなくなります
          echo "window.GEMINI_CONFIG = {" > config.js
          echo "  apiKey: '${{ secrets.GEMINI_API_KEY }}'," >> config.js
          echo "  buildTime: '$(date +'%Y-%m-%d %H:%M:%S')'" >> config.js
          echo "};" >> config.js
          echo "config.js created contents:"
          cat config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
