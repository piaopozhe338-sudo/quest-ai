name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          MY_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. 書き換え実行（デリミタを変更し、環境変数経由で確実に渡す）
          sed -i "s|__API_KEY_PLACEHOLDER__|${MY_API_KEY}|g" index.html
          
          # 2. 【重要】書き換えが成功したかチェック
          # もしファイル内にまだプレースホルダーが残っていたら、エラーで終了させる
          if grep -q "__API_KEY_PLACEHOLDER__" index.html; then
            echo "Error: API key placeholder was not replaced!"
            exit 1
          fi
          
          # 3. キーが空（Secretsが未設定）でないかチェック
          # sed後、該当行が 'const GEMINI_API_KEY = '';' のようになっていないか確認
          if grep -q "const GEMINI_API_KEY = '';" index.html; then
            echo "Error: API key is empty. Check your GitHub Secrets named GEMINI_API_KEY."
            exit 1
          fi
          
          echo "Injection successful."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
