<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AI Vision (Photo Upload Fallback)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      padding-bottom: 20px;
      z-index: 100;
    }

    .btn-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 10px;
    }

    .action-btn {
      padding: 15px 25px;
      font-size: 18px;
      background: #00ffcc;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      border: 2px solid #fff;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .action-btn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
      border-color: #555;
    }

    .upload-btn {
      background: #ff9f43;
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    #log {
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      width: 85%;
      max-height: 140px;
      overflow-y: auto;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      pointer-events: auto;
      border: 1px solid #00ffcc;
    }

    #previewContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: 90px;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
      z-index: 110;
      display: none;
    }

    #previewImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <a-scene
    webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers, camera-access; overlayElement: #overlay;"
    embedded>
    <a-entity position="0 1.5 -1.2">
      <a-plane color="#111" width="2" height="1.4" opacity="0.95">
        <a-text id="vrStatus" value="AI VISION READY" align="center" width="1.8" color="#00ffcc"
          position="0 0.45 0.01"></a-text>
        <a-text id="vrResult" value="AIに画像を送って解析します" align="center" width="1.8" wrap-count="35"
          position="0 -0.1 0.01"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls></a-entity>
  </a-scene>

  <div id="overlay">
    <div id="previewContainer"><img id="previewImg" src=""></div>
    <div class="btn-container">
      <button id="btn" class="action-btn" onclick="takePhoto()" disabled>📷 VRキャプチャ</button>
      <label id="uploadBtnLabel" class="action-btn upload-btn" for="fileInput">📁 写真を選択 (推奨)</label>
      <input type="file" id="fileInput" accept="image/jpeg, image/png">
    </div>
    <div id="log">
      起動中...<br>
      <span style="color:#ff9f43">※Meta Questのプライバシー仕様により、JSからのカメラ取得は制限されています。<br>
        Questのスクショ機能（Metaボタン+右トリガー）で撮影し、「写真を選択」からアップロードしてください。</span>
    </div>
    <canvas id="c" style="display:none"></canvas>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const vrStatus = document.getElementById('vrStatus');
    const vrResult = document.getElementById('vrResult');
    const c = document.getElementById('c');
    const btn = document.getElementById('btn');
    const fileInput = document.getElementById('fileInput');

    let targetModel = "";
    let sceneEl = null;

    function print(msg, color = '') {
      const d = document.createElement('div');
      if (color) d.style.color = color;
      d.innerHTML = `> ${msg}`; // innerHTML to allow basic tags
      logEl.prepend(d);
      vrStatus.setAttribute('value', msg.replace(/<[^>]*>?/gm, ''));
    }

    async function fetchAvailableModels(key) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const data = await res.json();
        if (data.models) {
          const valid = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name.replace('models/', ''));
          targetModel = valid.find(m => m.includes('flash')) || valid[0];
          print(`モデル準備完了: ${targetModel}`, "#0f0");
          return true;
        }
      } catch (e) { print("モデル取得失敗", "#f55"); }
      return false;
    }

    window.onload = async () => {
      sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('enter-vr', () => {
        print("ARモード開始（Quest仕様の制限に注意）", "#0f0");
      });

      if (typeof GEMINI_CONFIG !== 'undefined') {
        print(`ビルド: ${GEMINI_CONFIG.buildTime}`);
        const success = await fetchAvailableModels(GEMINI_CONFIG.apiKey.trim());
        if (success) btn.disabled = false;
      }
    };

    // ====== 手動アップロード処理 ======
    fileInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (event) {
        const dataUrl = event.target.result;
        const base64 = dataUrl.split(',')[1];

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewContainer').style.display = 'block';

        print(`ファイル画像で解析を開始します... (${file.name})`, "#fb0");
        await sendToAI(base64);
        fileInput.value = ""; // リセット
      };
      reader.readAsDataURL(file);
    });

    // ====== AIへの送信処理共通化 ======
    async function sendToAI(base64) {
      if (document.body.classList.contains('processing')) return;
      document.body.classList.add('processing');

      print("AI送信中...");
      vrResult.setAttribute('value', "AIに接続しています...");

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${GEMINI_CONFIG.apiKey.trim()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これ何？日本語1行で。写っている実世界のものを教えて。" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await res.json();
        if (res.ok) {
          const reply = data.candidates[0].content.parts[0].text;
          print("解析完了！内容を表示します。", "#0f0");
          vrStatus.setAttribute('value', "AIの解析結果");
          vrResult.setAttribute('value', reply);
        } else {
          throw new Error(data.error ? data.error.message : "APIエラー");
        }
      } catch (e) {
        print("失敗: " + e.message, "#f55");
        vrResult.setAttribute('value', "エラー: " + e.message);
      } finally {
        document.body.classList.remove('processing');
      }
    }

    // ====== VRキャプチャ処理 (制限あり) ======
    async function takePhoto() {
      if (document.body.classList.contains('processing')) return;

      const renderer = sceneEl.renderer;
      if (!renderer) {
        print("エラー: レンダラーが準備できていません", "#f55");
        return;
      }

      const canvas = renderer.domElement;
      if (!canvas || canvas.width <= 1 || canvas.height <= 1) {
        print("エラー: Questのプライバシー保護により、カメラピクセルがブロックされています。「写真を選択」を試してください。", "#f55");
        return;
      }

      print(`VRキャプチャを試行中... ※Quest仕様で真っ暗になる可能性があります`, "#fb0");

      try {
        const ctx = c.getContext('2d');
        c.width = 1024;
        c.height = Math.round(1024 * (canvas.height / canvas.width));

        renderer.render(sceneEl.object3D, sceneEl.camera);
        ctx.drawImage(canvas, 0, 0, c.width, c.height);

        const dataUrl = c.toDataURL('image/jpeg', 0.8);
        const base64 = dataUrl.split(',')[1];

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewContainer').style.display = 'block';

        await sendToAI(base64);
      } catch (e) {
        print("キャプチャ失敗: プライバシー制限の可能性があります。「写真を選択」を利用してください。", "#f55");
      }
    }
  </script>
</body>

</html>
