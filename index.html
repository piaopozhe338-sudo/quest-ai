<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AI Vision (WebXR Camera)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      padding-bottom: 40px;
      z-index: 100;
    }

    #btn {
      padding: 20px 40px;
      font-size: 22px;
      background: #00ffcc;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      border: 2px solid #fff;
    }

    #log {
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      width: 85%;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      pointer-events: auto;
      border: 1px solid #00ffcc;
    }

    #previewContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: 90px;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
      z-index: 110;
      display: none;
    }

    #previewImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <!-- WebXR Camera Access API をリクエスト -->
  <a-scene
    webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers, camera-access; overlayElement: #overlay;"
    embedded>
    <a-entity position="0 1.5 -1.2">
      <a-plane color="#111" width="2" height="1.4" opacity="0.95">
        <a-text id="vrStatus" value="AI VISION READY" align="center" width="1.8" color="#00ffcc"
          position="0 0.4 0.01"></a-text>
        <a-text id="vrResult" value="Ready for AR session..." align="center" width="1.8" wrap-count="35"
          position="0 -0.1 0.01"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls></a-entity>
  </a-scene>

  <div id="overlay">
    <div id="previewContainer"><img id="previewImg" src=""></div>
    <button id="btn" onclick="takePhoto()">📷 解析スタート</button>
    <div id="log">WebXRセッションを待機中...</div>
    <canvas id="c" style="display:none"></canvas>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const vrStatus = document.getElementById('vrStatus');
    const vrResult = document.getElementById('vrResult');
    const c = document.getElementById('c');
    const btn = document.getElementById('btn');

    let targetModel = "";
    const API_VERSIONS = ['v1beta'];
    let MODELS = [];
    let xrSession = null;

    function print(msg, color = '') {
      const d = document.createElement('div');
      if (color) d.style.color = color;
      d.innerText = `> ${msg}`;
      logEl.prepend(d);
      vrStatus.setAttribute('value', msg);
    }

    async function fetchAvailableModels(key) {
      print("モデル一覧を取得中...");
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const data = await res.json();
        if (data.models) {
          const validModels = data.models
            .filter(m => m.supportedGenerationMethods.includes('generateContent'))
            .map(m => m.name.replace('models/', ''));
          const flash = validModels.find(m => m.includes('flash'));
          targetModel = flash || validModels.find(m => !m.includes('pro')) || validModels[0];
          MODELS = [targetModel];
          print(`モデル選択完了: ${targetModel}`, "#0f0");
          return true;
        }
      } catch (e) { print("モデル取得失敗", "#f55"); }
      return false;
    }

    window.onload = async () => {
      const scene = document.querySelector('a-scene');
      scene.addEventListener('enter-vr', () => {
        xrSession = scene.renderer.xr.getSession();
        print("実世界カメラへのアクセスを準備しました (WebXR)", "#0f0");
      });

      if (typeof GEMINI_CONFIG !== 'undefined') {
        print(`ビルド: ${GEMINI_CONFIG.buildTime}`);
        const success = await fetchAvailableModels(GEMINI_CONFIG.apiKey.trim());
        if (success) btn.disabled = false;
      }
    };

    async function takePhoto() {
      if (document.body.classList.contains('processing')) return;

      // WebXRセッションがない場合は従来の方法（アバターの可能性あり）を試みる
      const useWebXR = !!(xrSession && xrSession.cameraColorTextureWidth);

      document.body.classList.add('processing');
      print(useWebXR ? "実世界(WebXR)をキャプチャ中..." : "カメラをキャプチャ中...", "#fb0");

      try {
        const ctx = c.getContext('2d');
        // A-FrameのCanvas（レンダリング結果）を取得
        const sceneCanvas = document.querySelector('a-scene').canvas;
        c.width = sceneCanvas.width;
        c.height = sceneCanvas.height;
        ctx.drawImage(sceneCanvas, 0, 0);

        const dataUrl = c.toDataURL('image/jpeg', 0.8);
        const base64 = dataUrl.split(',')[1];

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewContainer').style.display = 'block';

        const key = GEMINI_CONFIG.apiKey.trim();
        let lastError = "";

        for (const ver of API_VERSIONS) {
          for (const model of MODELS) {
            try {
              const apiUrl = `https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`;
              print(`送信中 (${model})...`);
              vrResult.setAttribute('value', "AIが考え中...");

              const res = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: "これ何？日本語1行で" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
                })
              });

              const data = await res.json();
              if (res.ok) {
                let reply = data.candidates[0].content.parts[0].text;
                print("解析完了！内容を表示します。", "#0f0");
                vrStatus.setAttribute('value', "AIの解析結果");
                vrResult.setAttribute('value', reply);
                document.body.classList.remove('processing');
                return;
              } else {
                lastError = data.error ? data.error.message : "HTTP " + res.status;
                if (res.status === 404) continue;
                throw new Error(lastError);
              }
            } catch (e) { lastError = e.message; continue; }
          }
        }
        throw new Error(lastError);
      } catch (e) {
        print("失敗: " + e.message, "#f55");
        vrResult.setAttribute('value', "エラー詳細:\n" + e.message);
      } finally {
        document.body.classList.remove('processing');
      }
    }
  </script>
</body>

</html>
