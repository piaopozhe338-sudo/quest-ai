<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AI Vision (Auto-Select Model)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      padding-bottom: 40px;
      z-index: 100;
    }

    #btn {
      padding: 20px 40px;
      font-size: 22px;
      background: #ff9f43;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      border: 2px solid #fff;
    }

    #log {
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      width: 85%;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      pointer-events: auto;
      border: 1px solid #00ffcc;
    }

    #previewContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: 90px;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
      z-index: 110;
      display: none;
    }

    #previewImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;" embedded>
    <a-entity position="0 1.5 -1.2">
      <a-plane color="#111" width="2" height="1.4" opacity="0.95">
        <a-text id="vrStatus" value="AI VISION (AUTO MODEL)" align="center" width="1.8" color="#ff9f43"
          position="0 0.4 0.01"></a-text>
        <a-text id="vrResult" value="モデルを検索中..." align="center" width="1.8" wrap-count="35"
          position="0 -0.1 0.01"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls></a-entity>
  </a-scene>

  <div id="overlay">
    <div id="previewContainer"><img id="previewImg" src=""></div>
    <button id="btn" onclick="takePhoto()">📷 解析スタート</button>
    <div id="log">起動中...</div>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const vrStatus = document.getElementById('vrStatus');
    const vrResult = document.getElementById('vrResult');
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const btn = document.getElementById('btn');

    let targetModel = "";
    // Define API_VERSIONS and MODELS based on the new takePhoto logic
    const API_VERSIONS = ['v1beta']; // Assuming this is the version used in the new takePhoto
    let MODELS = []; // This will be populated by fetchAvailableModels

    function print(msg, color = '') {
      const d = document.createElement('div');
      if (color) d.style.color = color;
      d.innerText = `> ${msg}`;
      logEl.prepend(d);
      vrStatus.setAttribute('value', msg);
    }

    async function fetchAvailableModels(key) {
      print("Geminiから使えるモデル一覧を取得中...");
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const data = await res.json();

        if (!res.ok) {
          print(`モデル取得エラー: APIキーが無効か、権限がありません (${res.status})`, "#f55");
          if (data.error) print(`詳細: ${data.error.message}`, "#f55");
          return false;
        }

        if (data.models && data.models.length > 0) {
          const validModels = data.models
            .filter(m => m.supportedGenerationMethods.includes('generateContent'))
            .map(m => m.name.replace('models/', ''));

          print(`利用可能モデル数: ${validModels.length}個`, "#0ff");

          // 【重要】ProモデルはQuota（課金制限）に引っかかりやすいため、意図的に除外して軽量なFlashを選ぶ
          // gemini-1.5-flash または gemini-2.0-flash など、確実に動作するモデルを探す
          const flash = validModels.find(m => m.includes('flash'));

          // Flashが見つかればそれ、なければ（仕方なく）リストの先頭を使うが、Proは避ける
          targetModel = flash || validModels.find(m => !m.includes('pro')) || validModels[0];
          MODELS = [targetModel]; // Populate MODELS array for the new takePhoto function

          print(`✅ 最適なモデル(軽量)を自動選択: ${targetModel}`, "#0f0");
          vrResult.setAttribute('value', `使用モデル:\n${targetModel}\n準備完了です`);
          return true;
        } else {
          print("利用可能なモデルが1つも見つかりません。", "#f55");
          return false;
        }
      } catch (e) {
        print(`モデル通信エラー: ${e.message}`, "#f55");
        return false;
      }
    }

    window.onload = async () => {
      if (typeof GEMINI_CONFIG === 'undefined') {
        print("config.jsが見つかりません。リロードしてください。", "#f55");
        return;
      }
      const key = GEMINI_CONFIG.apiKey.trim();
      print(`ビルド確認: ${GEMINI_CONFIG.buildTime}`);

      // カメラ準備
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        v.srcObject = s;
        print("カメラ準備OK");
      } catch (e) {
        print("カメラエラー: " + e.message, "#f55");
      }

      // モデル検索
      const success = await fetchAvailableModels(key);
      if (success) {
        btn.innerText = `📷 スキャン (${targetModel.substring(0, 10)}...)`;
        btn.disabled = false;
      } else {
        btn.innerText = "❌ 設定エラー";
      }
    };

    async function takePhoto() {
      if (document.body.classList.contains('processing')) return;
      document.body.classList.add('processing');

      print("画像をキャプチャ中...", "#fb0");
      vrResult.setAttribute('value', "画像を準備中...");

      try {
        const ctx = c.getContext('2d');
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const dataUrl = c.toDataURL('image/jpeg', 0.8);
        const base64 = dataUrl.split(',')[1];

        // プレビュー表示
        const previewImg = document.getElementById('previewImg');
        const previewContainer = document.getElementById('previewContainer');
        previewImg.src = dataUrl;
        previewContainer.style.display = 'block';
        print("キャプチャ完了。AIに送信します...");

        const key = GEMINI_CONFIG.apiKey.trim();
        let lastError = "";

        for (const ver of API_VERSIONS) {
          for (const model of MODELS) {
            try {
              const apiUrl = `https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`;
              print(`送信中 (${ver}/${model})...`);
              vrResult.setAttribute('value', "AIが考え中...");

              const res = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: "これ何？日本語1行で" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
                })
              });

              const data = await res.json();
              if (res.ok) {
                const reply = data.candidates[0].content.parts[0].text;
                print("解析が完了しました！", "#0f0");

                // VRパネルに回答を大きく表示
                vrStatus.setAttribute('value', "AIの解析結果");
                vrStatus.setAttribute('color', "#0f0");
                vrResult.setAttribute('value', reply);
                vrResult.setAttribute('color', "#fff");

                document.body.classList.remove('processing');
                return;
              } else {
                lastError = data.error ? data.error.message : "HTTP " + res.status;
                print(`エラー (${model}): ${lastError}`, "#f55");
                if (lastError.includes("not found")) continue;
                throw new Error(lastError);
              }
            } catch (e) {
              lastError = e.message;
              continue;
            }
          }
        }
        throw new Error("全モデルで失敗しました: " + lastError);
      } catch (e) {
        print("失敗: " + e.message, "#f55");
        vrResult.setAttribute('value', "エラー詳細:\n" + e.message);
      } finally {
        document.body.classList.remove('processing');
      }
    }
  </script>
</body>

</html>
