<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Quest AI Vision</title>
    <meta name="description" content="Quest 3 AI Passthrough App">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      #overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 10;
        font-family: sans-serif;
      }
      #captureBtn {
        padding: 15px 30px;
        font-size: 1.2rem;
        pointer-events: auto;
        border-radius: 50px;
        border: none;
        background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        color: white;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: transform 0.2s;
      }
      #captureBtn:active {
        transform: translateX(-50%) scale(0.95);
      }
      /* スキャン中のインジケーター */
      .scanning #captureBtn {
        background: #ccc;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- A-Frame Scene -->
    <a-scene
      webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
      xr-mode-ui="enabled: true; XRMode: ar"
      renderer="colorManagement: true;"
      embedded
    >
      <!-- 環境・照明 -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="1 1 1" intensity="0.8"></a-light>

      <!-- ハンドトラッキング -->
      <a-entity id="leftHand" hand-tracking-controls="hand: left;"></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right;"></a-entity>

      <!-- VR空間内のUIパネル -->
      <a-entity id="uiContainer" position="0 1.5 -1">
        <a-plane id="panel" color="#1a1a1a" opacity="0.8" width="1.2" height="0.6" rounded="0.05">
            <a-text id="statusText" value="物体に向けてボタンを押してください" 
                    align="center" position="0 0.15 0.01" width="1.1" color="#00f2fe"></a-text>
            <a-text id="resultText" value="AIがここに回答を表示します" 
                    align="center" position="0 -0.05 0.01" width="1.0" wrap-count="30"></a-text>
        </a-plane>
      </a-entity>

      <!-- カメラとレティクル -->
      <a-entity camera look-controls>
        <a-entity id="reticle"
                  cursor="fuse: false;"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                  material="color: #00f2fe; shader: flat; opacity: 0.5"
                  raycaster="objects: .collidable">
        </a-entity>
      </a-entity>
    </a-scene>

    <!-- HTML オーバーレイ (2D/AR用UI) -->
    <div id="overlay">
        <button id="captureBtn">スキャン開始</button>
        <video id="video" autoplay playsinline style="display: none;"></video>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <!-- アプリケーションロジック -->
    <script src="js/app.js"></script>
  </body>
</html>
