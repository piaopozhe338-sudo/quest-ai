<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>Quest AI Debugger</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      font-family: sans-serif;
      color: white;
    }

    #captureBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      pointer-events: auto;
      border-radius: 50px;
      border: none;
      background: #ff0055;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #debugLog {
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.8rem;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      pointer-events: auto;
    }

    .scanning #captureBtn {
      background: #555;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
    xr-mode-ui="enabled: true; XRMode: ar" embedded>
    <a-entity id="uiContainer" position="0 1.5 -1.5">
      <a-plane color="#000" width="2" height="1.2" opacity="0.9">
        <a-text id="debugPanelText" value="DEBUG STARTING..." align="center" width="1.8" color="#ff0055"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls>
      <a-entity geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #ff0055; shader: flat"
        position="0 0 -1"></a-entity>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <button id="captureBtn">スキャン(解析)実行</button>
    <div id="debugLog">Initializing logs...</div>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>

  <script>
    const VERSION = "v1.5-final-debug";
    const GEMINI_API_KEY = '__API_KEY_PLACEHOLDER__';
    const GEMINI_MODEL = 'gemini-1.5-flash';

    const debugLog = document.getElementById('debugLog');
    const debugPanelText = document.getElementById('debugPanelText');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function log(msg) {
      const div = document.createElement('div');
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugLog.prepend(div);
      debugPanelText.setAttribute('value', msg + "\n" + debugPanelText.getAttribute('value').substring(0, 500));
      console.log(msg);
    }

    async function init() {
      log(`APP VERSION: ${VERSION}`);

      // APIキーの注入判定
      if (GEMINI_API_KEY === '__API_KEY_PLACEHOLDER__') {
        log("【致命的エラー】APIキーが注入されていません。GitHub Actionsの設定またはデプロイ先のブランチ設定が間違っています。");
      } else if (GEMINI_API_KEY.length < 5) {
        log("【警告】APIキーが空または短すぎます: " + GEMINI_API_KEY);
      } else {
        log("APIキー注入成功を確認: " + GEMINI_API_KEY.substring(0, 6) + "...");
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        log("カメラ起動成功");
      } catch (e) { log("カメラ失敗: " + e.message); }
    }

    async function scan() {
      if (document.body.classList.contains('scanning')) return;
      document.body.classList.add('scanning');
      log("--- 解析リクエスト開始 ---");

      try {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        log("画像キャプチャ完了");

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
        log("Geminiに通信開始...");

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: "これは何？日本語で1行で。" },
                { inlineData: { mimeType: "image/jpeg", data: base64 } }
              ]
            }]
          })
        }).catch(err => { throw new Error("通信自体に失敗(オフライン/ブロック): " + err.message); });

        const data = await response.json();
        log(`レスポンス受信: HTTP ${response.status}`);

        if (!response.ok) {
          const msg = data.error ? data.error.message : "詳細不明";
          throw new Error(`APIエラー(${response.status}): ${msg}`);
        }

        log("解析成功: " + data.candidates[0].content.parts[0].text);
      } catch (e) {
        log("【エラー発生】: " + e.message);
      } finally {
        document.body.classList.remove('scanning');
      }
    }

    document.getElementById('captureBtn').addEventListener('click', scan);
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
