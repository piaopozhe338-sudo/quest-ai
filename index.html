<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>Quest AI Vision (Diagnosis)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      font-family: sans-serif;
      color: white;
    }

    #captureBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      pointer-events: auto;
      border-radius: 50px;
      border: none;
      background: #00f2fe;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #debugLog {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
      border: 1px solid #ff0055;
    }

    .err {
      color: #ff0055;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
    xr-mode-ui="enabled: true; XRMode: ar" embedded>
    <a-entity id="uiContainer" position="0 1.5 -1.5">
      <a-plane color="#000" width="2" height="1.4" opacity="0.95">
        <a-text id="debugPanelText" value="SYSTEM STARTING..." align="center" width="1.8" color="#00f2fe"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls><a-entity geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: #00f2fe; shader: flat" position="0 0 -1"></a-entity></a-entity>
  </a-scene>

  <div id="overlay">
    <button id="captureBtn">スキャン実行</button>
    <div id="debugLog">Initializing...</div>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>

  <script>
    const VERSION = "v1.6-diagnosis";
    const GEMINI_API_KEY = '__API_KEY_PLACEHOLDER__';
    const GEMINI_MODEL = 'gemini-1.5-flash';

    const debugLog = document.getElementById('debugLog');
    const debugPanelText = document.getElementById('debugPanelText');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function log(msg, isError = false) {
      const div = document.createElement('div');
      if (isError) div.className = 'err';
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugLog.prepend(div);
      debugPanelText.setAttribute('value', msg + "\n" + debugPanelText.getAttribute('value').substring(0, 500));
    }

    async function init() {
      log(`APP VERSION: ${VERSION}`);

      if (GEMINI_API_KEY === '__API_KEY_PLACEHOLDER__') {
        log("【！重要エラー！】GitHub上のPages設定が間違っています。", true);
        log("原因: 「Source」がまだ「Deploy from a branch」になっています。", true);
        log("対策: Settings > Pages > Build and deployment > Source を 「GitHub Actions」 に切り替えてください。", true);
      } else if (GEMINI_API_KEY === "") {
        log("【！重要エラー！】APIキーが空です。GitHub Secrets に GEMINI_API_KEY を登録したか確認してください。", true);
      } else {
        log("✅ APIキーの注入を確認成功: " + GEMINI_API_KEY.substring(0, 6) + "...");
        log("これで作動するはずです！スキャンを押してください。");
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        log("カメラ準備完了");
      } catch (e) { log("カメラ失敗: " + e.message, true); }
    }

    async function scan() {
      if (document.body.classList.contains('scanning')) return;
      if (GEMINI_API_KEY.startsWith('__')) { log("エラー: キーが注入されていないため通信できません。", true); return; }

      document.body.classList.add('scanning');
      log("--- 解析開始 ---");

      try {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        // APIのURLを v1 に変更してテスト
        const url = `https://generativelanguage.googleapis.com/v1/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これ何？日本語で1行。" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await response.json();
        log(`レスポンス: HTTP ${response.status}`);

        if (!response.ok) {
          const msg = data.error ? data.error.message : "詳細不明";
          throw new Error(`APIエラー(${response.status}): ${msg}`);
        }

        log("AIの回答: " + data.candidates[0].content.parts[0].text);
      } catch (e) {
        log("失敗: " + e.message, true);
      } finally {
        document.body.classList.remove('scanning');
      }
    }

    document.getElementById('captureBtn').addEventListener('click', scan);
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
