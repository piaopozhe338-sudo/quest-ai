<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AI Vision Stable</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      padding-bottom: 50px;
      z-index: 100;
    }

    #btn {
      padding: 25px 50px;
      font-size: 24px;
      background: #fb0;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #log {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      width: 80%;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      text-align: left;
      pointer-events: auto;
      border: 2px solid #fb0;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;" embedded>
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls></a-camera>
    </a-entity>

    <!-- VRパネル -->
    <a-entity position="0 1.5 -1.5">
      <a-plane color="#000" width="2" height="1.2" opacity="0.9">
        <a-text id="vrStatus" value="AI VISION READY" align="center" width="1.8" color="#fb0"
          position="0 0.3 0.01"></a-text>
        <a-text id="vrResult" value="Waiting for scan..." align="center" width="1.8" wrap-count="30"
          position="0 -0.1 0.01"></a-text>
      </a-plane>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <button id="btn" onclick="takePhoto()">📷 スキャン(確定版)</button>
    <div id="log">アプリを起動しました</div>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const vrStatus = document.getElementById('vrStatus');
    const vrResult = document.getElementById('vrResult');
    const v = document.getElementById('v');
    const c = document.getElementById('c');

    function print(msg, color = '') {
      const d = document.createElement('div');
      if (color) d.style.color = color;
      d.innerText = `> ${msg}`;
      logEl.prepend(d);
      vrStatus.setAttribute('value', msg);
      console.log(msg);
    }

    window.onload = () => {
      print("設定を確認中...");
      if (typeof GEMINI_CONFIG === 'undefined') {
        print("エラー: config.jsが読み込まれません。リロードしてください。", "#f55");
        return;
      }
      print(`ビルド: ${GEMINI_CONFIG.buildTime}`);
      print("APIキー接続確認済み", "#0f0");

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { v.srcObject = s; print("カメラOK"); })
        .catch(e => print("カメラNG: " + e.message, "#f55"));
    };

    async function takePhoto() {
      if (!GEMINI_CONFIG || !GEMINI_CONFIG.apiKey) return;
      print("解析中...", "#fb0");
      vrResult.setAttribute('value', "AIが考え中...");

      try {
        const ctx = c.getContext('2d');
        c.width = v.videoWidth; c.height = v.videoHeight;
        ctx.drawImage(v, 0, 0);
        const base64 = c.toDataURL('image/jpeg', 0.7).split(',')[1];

        // 安定版 API v1 を使用
        const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_CONFIG.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これ何？日本語1行で" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error ? data.error.message : "APIエラー");

        const reply = data.candidates[0].content.parts[0].text;
        print("解析成功", "#0f0");
        vrResult.setAttribute('value', reply);
      } catch (e) {
        print("失敗: " + e.message, "#f55");
        vrResult.setAttribute('value', "エラー: " + e.message);
      }
    }
  </script>
</body>

</html>
