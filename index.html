<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>AI Vision (Photo Upload Fallback)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      padding-bottom: 20px;
      z-index: 100;
    }

    .btn-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 10px;
    }

    .action-btn {
      padding: 15px 25px;
      font-size: 18px;
      background: #00ffcc;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      border: 2px solid #fff;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .action-btn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
      border-color: #555;
    }

    .upload-btn {
      background: #ff9f43;
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    #log {
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      width: 85%;
      max-height: 140px;
      overflow-y: auto;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      pointer-events: auto;
      border: 1px solid #00ffcc;
    }

    #answerBox {
      background: rgba(0, 50, 0, 0.95);
      color: #fff;
      width: 85%;
      max-height: 55vh;
      /* 縦幅を広げる */
      overflow-y: auto;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: left;
      pointer-events: auto;
      border: 2px solid #0f0;
      display: none;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
      line-height: 1.4;
    }

    #previewContainer {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: 90px;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      overflow: hidden;
      background: #222;
      z-index: 110;
      display: none;
    }

    #previewImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 15px;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #0f0;
    }

    .product-img-placeholder {
      font-size: 60px;
      margin: 10px 0;
      text-align: center;
    }

    .shop-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .shop-btn {
      padding: 10px 15px;
      color: #fff;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      text-decoration: none;
      flex: 1;
      display: block;
    }

    .btn-amazon {
      background: #ff9900;
      color: #000;
      text-shadow: none;
    }

    .btn-rakuten {
      background: #bf0000;
    }
  </style>
</head>

<body>
  <a-scene
    webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers, camera-access; overlayElement: #overlay;"
    embedded>
    <!-- 追加: 日本語フォントのアセット読み込み -->
    <a-assets>
      <a-asset-item id="noto-font"
        src="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/notosanscjkjp/NotoSansCJKjp-Regular.json"></a-asset-item>
    </a-assets>

    <a-entity position="0 1.5 -1.2">
      <a-plane color="#111" width="2" height="1.4" opacity="0.95">
        <a-text id="vrStatus" value="AI VISION READY" align="center" width="1.8" color="#00ffcc" position="0 0.45 0.01"
          font="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/notosanscjkjp/NotoSansCJKjp-Regular.json"
          shader="msdf"></a-text>
        <a-text id="vrResult" value="AIに画像を送って解析します" align="center" width="1.8" wrap-count="35" position="0 -0.1 0.01"
          font="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/notosanscjkjp/NotoSansCJKjp-Regular.json"
          shader="msdf"></a-text>
      </a-plane>
    </a-entity>

    <a-entity camera look-controls>
      <!-- 追加: 空間ピン留め（バーチャル付箋）を展開する用のコンテナ（カメラに追従） -->
      <a-entity id="pinsContainer" position="0 -0.2 -1.5"></a-entity>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <div id="previewContainer"><img id="previewImg" src=""></div>

    <!-- 追加: 日本語が確実に表示される回答枠 -->
    <div id="answerBox"></div>

    <div class="btn-container">
      <button id="btn" class="action-btn" onclick="takePhoto()" disabled>📷 VRキャプチャ</button>
      <label id="uploadBtnLabel" class="action-btn upload-btn" for="fileInput">📁 写真を選択 (推奨)</label>
      <input type="file" id="fileInput" accept="image/jpeg, image/png">
      <!-- 追加: 音声入力ボタン -->
      <button id="micBtn" class="action-btn" style="background:#ff5555; color:#fff;" onclick="toggleMic()">🎤
        音声で質問</button>
    </div>
    <div id="log">
      起動中...<br>
      <span style="color:#ff9f43">※Meta Questのプライバシー仕様により、JSからのカメラ取得は制限されています。<br>
        Questのスクショ機能（Metaボタン+右トリガー）で撮影し、「写真を選択」からアップロードしてください。</span>
    </div>
    <canvas id="c" style="display:none"></canvas>
  </div>

  <script>
    // === DOM要素の取得 ===
    const logEl = document.getElementById('log');
    const answerBox = document.getElementById('answerBox');
    const vrStatus = document.getElementById('vrStatus');
    const vrResult = document.getElementById('vrResult');
    const c = document.getElementById('c');
    const micBtn = document.getElementById('micBtn');

    // === グローバル変数 ===
    let targetModel = "";
    let availableModels = [];
    let isRecording = false;
    let recordedText = "";
    let recognition = null;
    let sceneEl = null;
    let recordStartTime = 0;
    let tempImageBase64 = "";

    // Web Audio API による診断用
    let audioContext = null;
    let analyser = null;
    let microphoneStream = null;
    let volumeMonitorTimer = null;

    function initAudioDiagnostic(stream) {
      if (!window.AudioContext && !window.webkitAudioContext) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        print("💡 音量診断を開始しました（声に反応するかチェック）", "#aaa");

        volumeMonitorTimer = setInterval(() => {
          if (!isRecording) return;
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
          let average = sum / bufferLength;

          if (average > 5) { // 一定以上の音量を検知
            vrResult.setAttribute('value', `🎤 入力検知: ${Math.round(average)} | ${recordedText || '...'}`);
          }
        }, 200);
      } catch (e) {
        console.error("Audio Diagnostic Error:", e);
      }
    }

    function stopAudioDiagnostic() {
      if (volumeMonitorTimer) clearInterval(volumeMonitorTimer);
      if (microphoneStream) {
        microphoneStream.getTracks().forEach(track => track.stop());
        microphoneStream = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
    }

    function print(msg, color = '') {
      try {
        if (!logEl) return;
        const d = document.createElement('div');
        d.style.color = color;
        d.style.marginBottom = '2px';
        d.innerHTML = msg;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
        if (vrStatus) vrStatus.setAttribute('value', msg.replace(/<[^>]*>?/gm, ''));
      } catch (e) {
        console.error("Print Error:", e);
      }
    }

    // 実行時エラーのログ表示
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      print(`🚨 JSエラー: ${msg} (L${lineNo})`, "#f55");
      return false;
    };

    // ====== 追加: 音声認識の初期設定 ======
    function initSpeechRecognition() {
      if (recognition) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        print("⚠️ お使いのブラウザは音声認識に対応していません。", "#f55");
        micBtn.disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = function () {
        isRecording = true;
        print("🎤 録音中...", "#0f0");
        micBtn.innerHTML = '🛑 録音停止';
        micBtn.style.background = '#ff0000';
      };

      recognition.onresult = function (event) {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          transcript += event.results[i][0].transcript;
        }
        if (transcript) {
          recordedText = transcript;
          // vrResultは音量診断と共有するため、ここでは更新しない
          // ログが埋まらないよう、確定時のみ出力
          if (event.results[event.results.length - 1].isFinal) {
            print(`🎤 確定: "${recordedText}"`, "#0f0");
          }
        }
      };

      recognition.onerror = function (event) {
        print(`⚠️ マイクエラー: ${event.error}`, "#f55");
        resetMicBtn();
        stopAudioDiagnostic();
      };

      recognition.onend = function () {
        resetMicBtn();
        stopAudioDiagnostic();
        let duration = Date.now() - recordStartTime;
        print(`💡 終了 (${Math.round(duration / 1000)}秒)`, "#aaa");

        if (tempImageBase64) {
          vrResult.setAttribute('value', "解析中...");
          sendToAI(tempImageBase64);
        } else if (recordedText) {
          vrResult.setAttribute('value', "画像待ち...");
          print(`👉 写真を送れば "${recordedText}" を解析します`, "#0ff");
        }
      };
    }

    let recordStartTime = 0;

    function resetMicBtn() {
      isRecording = false;
      micBtn.innerHTML = '🎤 音声で質問';
      micBtn.style.background = '#ff5555';
    }

    let isProcessing = false;

    async function toggleMic() {
      if (isProcessing) return;
      isProcessing = true;

      if (!recognition) initSpeechRecognition();

      if (isRecording) {
        try { recognition.stop(); } catch (e) { }
        resetMicBtn();
        stopAudioDiagnostic();
        isProcessing = false;
      } else {
        recordedText = "";
        tempImageBase64 = "";
        recordStartTime = Date.now();

        try {
          // 権限確認と診断開始
          print("💡 マイクをチェック中...", "#aaa");
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          initAudioDiagnostic(stream);
          microphoneStream = stream;

          // 遅延なしで即起動
          recognition.start();
          tempImageBase64 = captureVRImage();
        } catch (e) {
          print(`⚠️ マイク起動失敗: ${e.message}`, "#f55");
          resetMicBtn();
          stopAudioDiagnostic();
        } finally {
          isProcessing = false;
        }
      }
    }

    // ====== キャプチャ処理の共通化 ======
    function captureVRImage() {
      answerBox.style.display = 'none'; // 新しいキャプチャで一旦隠す
      const renderer = sceneEl.renderer;
      if (!renderer) {
        print("レンダラー未準備", "#f55");
        return null;
      }

      const canvas = renderer.domElement;
      // 幅・高さの判定を緩和（Quest等で0や1になることがあるため、取得できる範囲で強制描画を試みる）
      if (!canvas) {
        print("Canvasが取得できません", "#f55");
        return null;
      }

      try {
        const ctx = c.getContext('2d');
        c.width = canvas.width > 2 ? canvas.width : window.innerWidth || 1024;
        c.height = canvas.height > 2 ? canvas.height : window.innerHeight || 1024;

        // A-FrameのシーンをレンダリングしてCanvasに落とす
        renderer.render(sceneEl.object3D, sceneEl.camera);
        ctx.drawImage(canvas, 0, 0, c.width, c.height);

        const dataUrl = c.toDataURL('image/jpeg', 0.8);
        // ベース64データが短すぎる（ほぼ真っ黒や空文字）場合は失敗とみなす
        const base64 = dataUrl.split(',')[1];
        if (!base64 || base64.length < 100) {
          return null;
        }

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewContainer').style.display = 'block';

        return base64;
      } catch (e) {
        console.error("キャプチャ例外:", e);
        return null;
      }
    }

    // ====== 追加: 音声合成 (読み上げ) ======
    function speakText(text) {
      if (!window.speechSynthesis) return;
      // 読み上げキャンセル
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 1.2;
      utterance.pitch = 1.0;

      // キューが消えないバグ対策
      const timer = setInterval(() => {
        if (!window.speechSynthesis.speaking) {
          clearInterval(timer);
        }
      }, 500);

      window.speechSynthesis.speak(utterance);
    }

    // 起動時に音声合成を初期化（空のテキストでキック）
    function wakeupSpeech() {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance("");
      window.speechSynthesis.speak(u);
    }

    async function fetchAvailableModels(key) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const data = await res.json();
        if (data.models) {
          let valid = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name.replace('models/', ''));
          // 安定・無料枠優先しつつ新しい順にするため、flashモデルのみを抽出し、名前降順（2.5 -> 1.5 -> 1.0）にする
          valid = valid.filter(m => m.includes('flash')).sort().reverse();
          availableModels = valid.length > 0 ? valid : targetModel ? [targetModel] : ["gemini-1.5-flash"];
          print(`モデル準備完了: ${availableModels.length}種類`, "#0f0");
          return true;
        }
      } catch (e) { print("モデル取得失敗", "#f55"); }
      return false;
    }

    window.onload = async () => {
      sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('enter-vr', () => {
        print("ARモード開始（Quest仕様の制限に注意）", "#0f0");
        wakeupSpeech(); // VR開始時に音声をウォームアップ
      });

      initSpeechRecognition(); // 音声認識の初期化
      wakeupSpeech(); // ページロード時にもウォームアップ

      if (typeof GEMINI_CONFIG !== 'undefined') {
        print(`ビルド: 2026-02-23 03:55 (Bug Fix v9.1)`);
        const success = await fetchAvailableModels(GEMINI_CONFIG.apiKey.trim());
        if (success) btn.disabled = false;
      }
    };

    // ====== 手動アップロード処理 ======
    fileInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      answerBox.style.display = 'none'; // 新しいキャプチャで一旦隠す

      const reader = new FileReader();
      reader.onload = async function (event) {
        const dataUrl = event.target.result;
        const base64 = dataUrl.split(',')[1];

        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('previewContainer').style.display = 'block';

        if (recordedText) {
          print(`写真と録音した質問を送信します... (${file.name})`, "#fb0");
        } else {
          print(`ファイル画像で解析を開始します... (${file.name})`, "#fb0");
        }

        await sendToAI(base64);
        fileInput.value = ""; // リセット
      };
      reader.readAsDataURL(file);
    });

    // ====== AIへの送信処理共通化 ======
    async function sendToAI(base64) {
      if (document.body.classList.contains('processing')) return;
      document.body.classList.add('processing');

      print("AI送信中 (複数モデルで試行)...");
      vrResult.setAttribute('value', "AIに接続しています...");

      // 音声質問があるかどうかでプロンプトを切り替え
      let userInstruction = "ユーザーがアップロードした画像を見て、写っているメインの物体・商品（複数でも可）を特定してください。";
      if (recordedText) {
        userInstruction = `画像を見て、ユーザーからの次の質問「${recordedText}」に答えてください。また、画像内に写っている商品も特定してください。`;
      }

      const promptText = `
あなたは優秀な画像解析アシスタントです。${userInstruction}
以下の厳密なJSON形式で出力してください。Markdownのコードブロック構文(\`\`\`json)等は一切含めず、純粋なJSON文字列だけを返してください。

{
  "answerText": "質問に対する口語での回答（音声で読み上げるための、相槌を含む短い文章。質問がない場合はAIからの挨拶や気づきのみ）",
  "description": "画像の簡単な説明（日本語2〜3行）",
  "products": [
    {
      "name": "商品名1（なるべく正確なモデル名や一般的な検索キーワードになる名前）"
    },
    {
      "name": "商品名2（複数ある場合に追加）"
    }
  ]
}
※商品がない場合や特定不能な場合は "products": [] としてください。
`;

      let anySuccess = false;

      // 新しいモデル（配列の先頭）ら順に試行
      for (let i = 0; i < availableModels.length; i++) {
        const currentModel = availableModels[i];
        try {
          // print(`${currentModel} で試行中...`); // 詳細を出さないようにとの要望なので表示しない
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${GEMINI_CONFIG.apiKey.trim()}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
            })
          });

          const data = await res.json();
          if (res.ok) {
            const replyText = data.candidates[0].content.parts[0].text.trim();

            let aiResult = {};
            try {
              const cleanedText = replyText.replace(/```json/gi, '').replace(/```/g, '').trim();
              aiResult = JSON.parse(cleanedText);
            } catch (e) {
              console.error("JSONパースエラー:", e, "生データ:", replyText);
              aiResult = { description: replyText, products: [] };
            }

            print("解析完了！回答を表示します。", "#0f0");
            print(`💬 ${aiResult.description.substring(0, 20)}...`, "#0f0");

            // ===== 追加: 返答テキストの音声読み上げ =====
            if (aiResult.answerText) {
              speakText(aiResult.answerText);
            }

            answerBox.style.display = 'block';

            let htmlContent = ``;
            if (aiResult.answerText) {
              htmlContent += `<div style="color: #0ff; margin-bottom: 10px;">🎤 <strong>AI:</strong> ${aiResult.answerText}</div>`;
            }
            htmlContent += `<strong>【AIの解析結果 (${currentModel.replace("-flash", "")})】</strong><br><br>${aiResult.description.replace(/\\n/g, '<br>')}`;

            if (aiResult.products && aiResult.products.length > 0) {
              htmlContent += `
                <hr style="border-color:#555; margin: 15px 0;">
                <strong>🛒 認識された商品 (${aiResult.products.length}点):</strong>
                <div class="product-list">
              `;

              aiResult.products.forEach(prod => {
                if (!prod.name) return;
                const encodedName = encodeURIComponent(prod.name);
                const amazonUrl = `https://www.amazon.co.jp/s?k=${encodedName}`;
                const rakutenUrl = `https://search.rakuten.co.jp/search/mall/${encodedName}/`;

                htmlContent += `
                    <div class="product-info">
                      <div style="font-size: 1.1em; color: #0f0; margin-bottom: 5px;">${prod.name}</div>
                      <div class="product-img-placeholder">📦</div>
                      <div class="shop-links">
                        <a href="${amazonUrl}" target="_blank" class="shop-btn btn-amazon">Amazonで探す</a>
                        <a href="${rakutenUrl}" target="_blank" class="shop-btn btn-rakuten">楽天で探す</a>
                      </div>
                    </div>
                  `;
              });

              htmlContent += `</div>`;
            }

            answerBox.innerHTML = htmlContent;

            vrStatus.setAttribute('value', "AIの解析結果");
            vrResult.setAttribute('value', "(画面の回答をご覧ください)");

            // ===== 追加: バーチャル付箋（空間ピン留め）の生成 =====
            const pinsContainer = document.getElementById('pinsContainer');
            pinsContainer.innerHTML = ''; // 前回の付箋をクリア

            if (aiResult.products && aiResult.products.length > 0) {
              const total = aiResult.products.length;
              // 横に並べるための間隔と開始位置の計算
              const spacing = 1.2;
              const startX = -((total - 1) * spacing) / 2;

              aiResult.products.forEach((prod, idx) => {
                if (!prod.name) return;

                // 付箋の親エンティティ
                const pin = document.createElement('a-entity');
                let posX = startX + (idx * spacing);
                // 配置: 横に並べ、少しアーチ状（yとzを変える）に配置するとカッコいい
                let posZ = Math.abs(posX) * 0.2; // 端にいくほど少し手前に
                pin.setAttribute('position', `${posX} 0 ${posZ}`);
                // カメラの方へ少し向ける
                pin.setAttribute('rotation', `0 ${-posX * 15} 0`);

                // 付箋の背景（黄色い紙っぽく）
                const plane = document.createElement('a-plane');
                plane.setAttribute('color', '#ffee88');
                plane.setAttribute('width', '1.0');
                plane.setAttribute('height', '0.4');
                plane.setAttribute('opacity', '0.9');
                plane.setAttribute('material', 'shader: flat; side: double'); // 裏からも見えるように

                // 付箋の文字（商品名） 日本語フォント指定
                const text = document.createElement('a-text');
                text.setAttribute('value', prod.name);
                text.setAttribute('color', '#000000');
                text.setAttribute('align', 'center');
                text.setAttribute('width', '0.9'); // Planeより少し小さくして折り返し
                text.setAttribute('wrap-count', '15'); // 15文字で改行
                text.setAttribute('position', '0 0 0.01'); // Planeの少し前に浮かせる

                // A-Frameの日本語フォントを設定 (MSDF形式)
                const fontUrl = "https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/notosanscjkjp/NotoSansCJKjp-Regular.json";
                text.setAttribute('font', fontUrl);
                text.setAttribute('shader', 'msdf');

                // 組み立ててSceneに追加
                pin.appendChild(plane);
                pin.appendChild(text);
                pinsContainer.appendChild(pin);
              });
            }

            anySuccess = true;
            break; // 成功したためループを抜ける
          } else {
            // エラーの場合、次のモデルへ
            let errMessage = data.error && data.error.message ? data.error.message : "APIエラー";
            if (errMessage.includes("Quota") || res.status === 429) {
              print(`${currentModel}: レート制限不可`, "#fb0");
            } else {
              print(`${currentModel}: 使用不可`, "#fb0");
            }
          }
        } catch (e) {
          print(`${currentModel}: 通信不可`, "#fb0");
        }
      }

      if (!anySuccess) {
        print("全モデルで制限かエラー。時間をおいてね。", "#f55");
        vrResult.setAttribute('value', "エラー: 全モデル使用不可");
      }

      // 解析が終わった・失敗したため、質問テキストをリセット
      recordedText = "";
      document.body.classList.remove('processing');
    }

    // ====== 手動・VRキャプチャ処理 (※音声なしの単体実行用) ======
    async function takePhoto() {
      if (document.body.classList.contains('processing')) return;
      print(`VRキャプチャ実行中...`, "#fb0");

      const base64 = captureVRImage();
      if (base64) {
        await sendToAI(base64);
      } else {
        print("エラー: Questのプライバシー制限がかかっている可能性があります。「写真を選択」を試してください。", "#f55");
      }
    }
  </script>
