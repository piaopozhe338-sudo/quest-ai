<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>Quest AI Vision (Ultimate)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- キャッシュを強制回避して設定ファイルを読み込む -->
  <script>
    (function () {
      const script = document.createElement('script');
      script.src = 'config.js?t=' + Date.now();
      document.head.appendChild(script);
    })();
  </script>

  <style>
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      font-family: sans-serif;
      color: white;
    }

    #captureBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      pointer-events: auto;
      border-radius: 50px;
      border: none;
      background: #a29bfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid white;
    }

    #debugLog {
      background: rgba(45, 52, 54, 0.95);
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
      border: 1px solid #a29bfe;
    }

    .ok {
      color: #55efc4;
      font-weight: bold;
    }

    .err {
      color: #ff7675;
      font-weight: bold;
    }
  </style>
</head>

<body style="background: #2d3436;">
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
    xr-mode-ui="enabled: true; XRMode: ar" embedded>
    <a-entity id="uiContainer" position="0 1.5 -1.2">
      <a-plane color="#2d3436" width="2" height="1.4" opacity="0.95">
        <a-text id="debugPanelText" value="ULTIMATE VERSION LOADED" align="center" width="1.8" color="#a29bfe"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls><a-entity geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: #a29bfe; shader: flat" position="0 0 -1"></a-entity></a-entity>
  </a-scene>

  <div id="overlay">
    <button id="captureBtn" onclick="scan()">スキャン開始(ULTIMATE)</button>
    <div id="debugLog">Checking config...</div>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>

  <script>
    const debugLog = document.getElementById('debugLog');
    const debugPanelText = document.getElementById('debugPanelText');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function log(msg, type = '') {
      const div = document.createElement('div');
      if (type) div.className = type;
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugLog.prepend(div);
      debugPanelText.setAttribute('value', msg + "\n" + debugPanelText.getAttribute('value').substring(0, 300));
    }

    // 設定ファイルが読み込まれるのを待って初期化
    function checkConfig() {
      if (typeof window.GEMINI_CONFIG === 'undefined') {
        setTimeout(checkConfig, 500);
        return;
      }
      const { apiKey, buildTime } = window.GEMINI_CONFIG;
      log(`ビルド日時: ${buildTime}`);
      if (!apiKey || apiKey === '') {
        log("【！警告！】APIキーが空です。Secretsを確認してください。", "err");
      } else {
        log("✅ 成功！最新のAPIキーを認識しました。", "ok");
      }
    }

    window.addEventListener('load', () => {
      checkConfig();
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { video.srcObject = s; log("カメラ準備完了"); })
        .catch(e => log("カメラ失敗: " + e.message, "err"));
    });

    async function scan() {
      if (document.body.classList.contains('scanning')) return;
      if (!window.GEMINI_CONFIG || !window.GEMINI_CONFIG.apiKey) {
        alert("設定が読み込まれていません。1〜2秒待ってから再試行してください。");
        return;
      }

      document.body.classList.add('scanning');
      log("--- 解析開始 ---");

      try {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        // API URLの修正: モデル名を gemini-1.5-flash に固定。末尾の余計な文字を排除するため trim() を使用
        const cleanKey = window.GEMINI_CONFIG.apiKey.trim();
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${cleanKey}`;

        log("API送信中 (v1beta)...");
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これ何？日本語で1行。" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error ? data.error.message : "APIエラー " + response.status);
        log("✅ AI回答: " + data.candidates[0].content.parts[0].text, "ok");
      } catch (e) {
        log("失敗: " + e.message, "err");
        if (e.message.includes("404")) {
          log("ヒント: モデル名またはAPIキーの権限に問題がある可能性があります。", "err");
        }
      }
      finally { document.body.classList.remove('scanning'); }
    }
  </script>
</body>

</html>
