<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>Quest AI Vision (Final Stable)</title>
  <!-- 強力なキャッシュ回避設定 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- GitHub Actions が生成する設定ファイルを読み込みます -->
  <script src="config.js"></script>

  <style>
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      font-family: sans-serif;
      color: white;
    }

    #captureBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      pointer-events: auto;
      border-radius: 50px;
      border: none;
      background: #fbda61;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #debugLog {
      background: rgba(0, 0, 0, 0.95);
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
      border: 1px solid #fbda61;
    }

    .ok {
      color: #fbda61;
      font-weight: bold;
    }

    .err {
      color: #ff0055;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
    xr-mode-ui="enabled: true; XRMode: ar" embedded>
    <a-entity id="uiContainer" position="0 1.5 -1.2">
      <a-plane color="#000" width="2" height="1.4" opacity="0.95">
        <a-text id="debugPanelText" value="SYSTEM READY" align="center" width="1.8" color="#fbda61"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls><a-entity geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: #fbda61; shader: flat" position="0 0 -1"></a-entity></a-entity>
  </a-scene>

  <div id="overlay">
    <button id="captureBtn" onclick="scan()">スキャン開始</button>
    <div id="debugLog">System initializing...</div>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>

  <script>
    const debugLog = document.getElementById('debugLog');
    const debugPanelText = document.getElementById('debugPanelText');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function log(msg, type = '') {
      const div = document.createElement('div');
      if (type) div.className = type;
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugLog.prepend(div);
      debugPanelText.setAttribute('value', msg + "\n" + debugPanelText.getAttribute('value').substring(0, 300));
    }

    function init() {
      // config.js (window.GEMINI_CONFIG) が存在するかチェック
      if (typeof window.GEMINI_CONFIG === 'undefined') {
        log("【！警告！】設定ファイル(config.js)が見つかりません。", "err");
        log("原因: デプロイ直後で反映されていないか、Actionsの設定ミスです。", "err");
        return;
      }

      const { apiKey, buildTime } = window.GEMINI_CONFIG;
      log(`ビルド日時: ${buildTime}`);

      if (!apiKey || apiKey === '' || apiKey.startsWith('__')) {
        log("【！警告！】APIキーが読み込めませんでした。", "err");
        log("GitHub Secrets(GEMINI_API_KEY)を確認してください。", "err");
      } else {
        log("✅ 成功！最新の設定を読み込みました。", "ok");
        log("スキャンを開始できます。");
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { video.srcObject = s; log("カメラ準備完了"); })
        .catch(e => log("カメラ失敗: " + e.message, "err"));
    }

    async function scan() {
      if (document.body.classList.contains('scanning')) return;
      if (!window.GEMINI_CONFIG || !window.GEMINI_CONFIG.apiKey) {
        alert("設定が正しく読み込まれていません。リロードしてください。");
        return;
      }

      document.body.classList.add('scanning');
      log("--- 解析開始 ---");

      try {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${window.GEMINI_CONFIG.apiKey}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これ何？日本語で1行。" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error ? data.error.message : "APIエラー");
        log("✅ AI回答: " + data.candidates[0].content.parts[0].text, "ok");
      } catch (e) { log("失敗: " + e.message, "err"); }
      finally { document.body.classList.remove('scanning'); }
    }

    window.addEventListener('load', init);
  </script>
</body>

</html>
