<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>Quest AI Vision (Strict No-Cache)</title>
  <!-- キャッシュを無効化するメタタグ -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      font-family: sans-serif;
      color: white;
    }

    #captureBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      pointer-events: auto;
      border-radius: 50px;
      border: none;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #debugLog {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      pointer-events: auto;
      border: 2px solid white;
    }

    .ok {
      color: #00ff88;
    }

    .err {
      color: #ff0055;
      font-weight: bold;
    }

    .info {
      color: #aaa;
      font-style: italic;
    }
  </style>
</head>

<body>
  <a-scene webxr="optionalFeatures: hit-test, local-floor, dom-overlay, layers; overlayElement: #overlay;"
    xr-mode-ui="enabled: true; XRMode: ar" embedded>
    <a-entity id="uiContainer" position="0 1.5 -1.5">
      <a-plane color="#000" width="2" height="1.6" opacity="0.95">
        <a-text id="debugPanelText" value="FORCE RELOAD TEST" align="center" width="1.8" color="#00ff88"></a-text>
      </a-plane>
    </a-entity>
    <a-entity camera look-controls><a-entity geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: #00ff88; shader: flat" position="0 0 -1"></a-entity></a-entity>
  </a-scene>

  <div id="overlay">
    <button id="captureBtn" onclick="scan()">解析開始</button>
    <div id="debugLog">Checking for updates...</div>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </div>

  <script>
    // これらの値が __PLACEHOLDER__ のままなら「古いファイル」を見ていることになります
    const GEMINI_API_KEY = '__API_KEY_PLACEHOLDER__';
    const BUILD_TIME = '__BUILD_TIME_PLACEHOLDER__';

    const debugLog = document.getElementById('debugLog');
    const debugPanelText = document.getElementById('debugPanelText');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function log(msg, type = '') {
      const div = document.createElement('div');
      if (type) div.className = type;
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      debugLog.prepend(div);
      debugPanelText.setAttribute('value', msg + "\n" + debugPanelText.getAttribute('value').substring(0, 500));
    }

    function init() {
      log(`現在表示中のビルド時刻: ${BUILD_TIME}`);
      log(`URLパラメータ: ${window.location.search || "なし"}`);

      if (GEMINI_API_KEY === '__API_KEY_PLACEHOLDER__') {
        log("【！警告！】いまだに「古いバージョンのファイル」が表示されています。", "err");
        log("原因: ブラウザのキャッシュが非常に強力です。", "err");
        log("対策: URLの末尾に ?v=2 を付けてみてください。", "err");
      } else {
        log("✅ 成功！最新のファイルが読み込まれました。", "ok");
        log("解析を開始できます。");
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(s => { video.srcObject = s; log("カメラ準備完了"); })
        .catch(e => log("カメラ失敗: " + e.message, "err"));
    }

    async function scan() {
      if (document.body.classList.contains('scanning')) return;
      if (GEMINI_API_KEY.startsWith('__')) {
        alert("古いファイルが表示されているため実行できません。URLの末尾に ?v=2 を付けてリロードしてください。");
        return;
      }

      document.body.classList.add('scanning');
      log("--- 解析開始 ---");

      try {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "これは何？日本語で言え" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }]
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error ? data.error.message : "APIエラー");
        log("✅ AIの回答: " + data.candidates[0].content.parts[0].text, "ok");
      } catch (e) { log("失敗: " + e.message, "err"); }
      finally { document.body.classList.remove('scanning'); }
    }

    window.addEventListener('load', init);
  </script>
</body>

</html>
